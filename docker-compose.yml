version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: scarydraw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: scarydraw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scarydraw"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Prisma migrate (runs once, then exits) ─────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/http-backend/Dockerfile
    command: >
      sh -c "pnpm --filter @repo/db exec prisma migrate deploy --schema=prisma/schema.prisma"
    environment:
      DATABASE_URL: postgresql://scarydraw:${POSTGRES_PASSWORD}@postgres:5432/scarydraw
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── HTTP Backend (Express + Bull queue) ────────────────────
  http-backend:
    build:
      context: .
      dockerfile: apps/http-backend/Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://scarydraw:${POSTGRES_PASSWORD}@postgres:5432/scarydraw
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── WebSocket Backend ──────────────────────────────────────
  wsbackend:
    build:
      context: .
      dockerfile: apps/wsbackend/Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://scarydraw:${POSTGRES_PASSWORD}@postgres:5432/scarydraw
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_HTTP_BACKEND_URL: ${NEXT_PUBLIC_HTTP_BACKEND_URL}
        NEXT_PUBLIC_WS_BACKEND_URL: ${NEXT_PUBLIC_WS_BACKEND_URL}
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      BACKEND_URL: http://http-backend:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATABASE_URL: postgresql://scarydraw:${POSTGRES_PASSWORD}@postgres:5432/scarydraw
      GitHub_ClientId: ${GitHub_ClientId}
      GitHub_ClientSecret: ${GitHub_ClientSecret}
      Google_ClientId: ${Google_ClientId}
      Google_ClientSecret: ${Google_ClientSecret}
    depends_on:
      - http-backend
      - wsbackend

volumes:
  postgres_data:
  redis_data:
